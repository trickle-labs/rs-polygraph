name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate tag matches Cargo.toml version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Check version matches polygraph version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(grep '^version' crates/polygraph/Cargo.toml | sed 's/.*= *"\(.*\)"/\1/')
          if [ "$TAG" != "$CARGO_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match crates/polygraph/Cargo.toml version $CARGO_VERSION"
            exit 1
          fi
          echo "Version $CARGO_VERSION matches tag."

  ci:
    name: Full CI
    needs: validate
    uses: ./.github/workflows/ci.yml

  publish:
    name: Publish to crates.io
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish opencypher-parser
        run: cargo publish --package opencypher-parser --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for opencypher-parser to be available
        run: sleep 30
      - name: Publish polygraph
        run: cargo publish --package polygraph --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
